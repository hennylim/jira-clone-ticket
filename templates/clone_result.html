<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>복제 결과</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>복제 결과</h2>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>원본 Key</th>
                <th>상태</th>
                <th>메시지</th>
            </tr>
        </thead>
        <tbody>
        {% for r in results %}
            <tr>
                <td>{{ r.key }}</td>
                <td>{{ r.status }}</td>
                <td>{{ r.msg }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('index') }}" class="btn btn-primary">처음으로</a>
</div>
</body>
</html>
