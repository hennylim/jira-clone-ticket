<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Jira 검색 결과</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>검색 결과 - 복제할 티켓 선택</h2>
    <form method="post" action="{{ url_for('clone') }}">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>선택</th>
                    <th>Key</th>
                    <th>Summary</th>
                </tr>
            </thead>
            <tbody>
            {% for issue in issues %}
                <tr>
                    <td><input type="checkbox" name="selected_issues" value="{{ issue['key'] }}"></td>
                    <td>{{ issue['key'] }}</td>
                    <td>{{ issue['fields']['summary'] }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
        <button type="submit" class="btn btn-success">선택한 티켓 복제</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">처음으로</a>
    </form>
</div>
</body>
</html>
