<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jira Clone Ticket Web UI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-main">
                <div class="header-text">
                    <h1>Jira Clone Tool</h1>
                    <p class="subtitle">Search and clone Jira tickets with ease</p>
                </div>
                <div id="auth-container" class="auth-container">
                    <div id="user-display" class="user-display hidden">
                        <span id="username-span"></span>
                        <a href="/profile.html" class="btn btn-secondary btn-sm">Profile</a>
                        <button id="logout-btn" class="btn btn-secondary btn-sm hidden">Logout</button>
                    </div>
                </div>
        </header>

        <!-- Main App Content -->
        <main id="app-content">
            <section class="config-section">
                <h2>1. Configuration</h2>
                <div class="card">
                    <div id="presets-container" class="presets-container hidden">
                        <label for="config-presets">Saved Presets:</label>
                        <select id="config-presets">
                            <option value="">-- Select a preset --</option>
                        </select>
                        <button id="update-db-btn" class="btn btn-secondary btn-sm" disabled>Update</button>
                        <button id="delete-db-btn" class="btn btn-danger btn-sm">Delete</button>
                    </div>
                    <p class="card-hint">Customize parameters below. You can also upload a JSON file or load the
                        example.</p>
                    <div id="config-form" class="config-grid">
                        <!-- Form fields will be dynamically generated here -->
                    </div>
                    <div class="db-save-container">
                        <input type="text" id="config-name" placeholder="Configuration Name (e.g. Daily Sync)"
                            class="form-input">
                        <button id="save-db-btn" class="btn btn-secondary">Save to DB</button>
                    </div>
                    <input type="file" id="file-input" accept=".json" class="hidden">
                    <div class="button-group">
                        <button id="save-config-btn" class="btn btn-secondary">Download JSON</button>
                        <button id="load-file-btn" class="btn btn-secondary">Upload JSON</button>
                        <button id="load-example" class="btn btn-secondary">Load Example</button>
                        <button id="search-btn" class="btn btn-primary">Search Issues</button>
                    </div>
                </div>
            </section>

            <section id="results-section" class="results-section hidden">
                <h2>2. Select Issues</h2>
                <div class="card">
                    <div id="issue-list-container">
                        <table id="issue-table">
                            <thead>
                                <tr>
                                    <th><input type="checkbox" id="select-all"></th>
                                    <th>Key</th>
                                    <th>Summary</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="issue-body">
                                <!-- Issues will be listed here -->
                            </tbody>
                        </table>
                    </div>
                    <div class="button-group">
                        <button id="clone-btn" class="btn btn-primary">Clone Selected</button>
                    </div>
                </div>
            </section>

            <section id="progress-section" class="progress-section hidden">
                <h2>3. Progress</h2>
                <div class="card">
                    <div id="progress-log" class="log-view">
                        <!-- Progress messages will appear here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
